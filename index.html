<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinemateca</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080c14; --surface:#0f1623; --card:#141d2e;
    --border:#1e2d45; --accent:#e8a020; --text:#e8edf5;
    --muted:#6b7a94; --gold:#f0c040; --purple:#7b2ff7;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }

  /* HEADER */
  header {
    position:sticky; top:0; z-index:100;
    background:rgba(8,12,20,0.97); backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
    padding:0 2rem; height:68px;
    display:flex; align-items:center; justify-content:space-between; gap:1rem;
  }
  .logo { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .logo-icon { width:36px; height:36px; background:var(--accent); clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%); }
  .logo-text { font-family:'Bebas Neue',cursive; font-size:1.8rem; letter-spacing:2px; }
  .logo-text span { color:var(--accent); }
  nav { display:flex; gap:6px; }
  .nav-btn {
    background:transparent; border:1px solid transparent; color:var(--muted);
    padding:8px 18px; border-radius:8px; cursor:pointer;
    font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:500; transition:all 0.2s;
  }
  .nav-btn:hover { color:var(--text); border-color:var(--border); background:var(--surface); }
  .nav-btn.active { color:var(--accent); border-color:var(--accent); background:rgba(232,160,32,0.08); }
  .search-bar {
    display:flex; align-items:center; background:var(--surface);
    border:1px solid var(--border); border-radius:8px; padding:8px 14px; gap:8px;
    transition:border-color 0.2s; flex:1; max-width:260px;
  }
  .search-bar:focus-within { border-color:var(--accent); }
  .search-bar input { background:transparent; border:none; outline:none; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem; width:100%; }
  .search-bar input::placeholder { color:var(--muted); }

  /* HERO */
  .hero { position:relative; height:520px; overflow:hidden; margin-bottom:2.5rem; }
  .hero-bg { position:absolute; inset:0; background-size:cover; background-position:center 20%; filter:brightness(0.38); transition:background-image 0.8s; }
  .hero-gradient {
    position:absolute; inset:0;
    background:linear-gradient(to right,rgba(8,12,20,0.97) 35%,transparent 70%),
               linear-gradient(to top,rgba(8,12,20,1) 0%,transparent 45%);
  }
  .hero-content { position:relative; z-index:2; padding:110px 3rem 0; max-width:580px; }
  .hero-tag { display:inline-block; background:var(--accent); color:#000; font-size:0.68rem; font-weight:800; letter-spacing:2.5px; padding:4px 11px; border-radius:4px; margin-bottom:14px; text-transform:uppercase; }
  .hero-title { font-family:'Bebas Neue',cursive; font-size:4.2rem; line-height:0.95; margin-bottom:14px; letter-spacing:1px; }
  .hero-meta { display:flex; align-items:center; gap:12px; margin-bottom:14px; font-size:0.88rem; color:var(--muted); flex-wrap:wrap; }
  .hero-rating { color:var(--gold); font-weight:700; }
  .hero-desc { font-size:0.92rem; line-height:1.65; color:#b8c2d4; margin-bottom:22px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .hero-actions { display:flex; gap:10px; flex-wrap:wrap; }

  /* BUTTONS */
  .btn-watch {
    background:var(--accent); color:#000; border:none; padding:12px 28px;
    border-radius:10px; font-family:'DM Sans',sans-serif; font-weight:800; font-size:1rem;
    cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:8px;
    text-decoration:none; letter-spacing:0.3px;
  }
  .btn-watch:hover { background:#f5b030; transform:translateY(-2px); box-shadow:0 8px 24px rgba(232,160,32,0.3); }
  .btn-info {
    background:rgba(255,255,255,0.1); color:var(--text);
    border:1px solid rgba(255,255,255,0.25); padding:12px 24px;
    border-radius:10px; font-family:'DM Sans',sans-serif; font-weight:600; font-size:0.95rem;
    cursor:pointer; transition:all 0.2s; backdrop-filter:blur(4px);
  }
  .btn-info:hover { background:rgba(255,255,255,0.18); }

  /* TABS */
  .tabs { display:flex; gap:8px; padding:0 2rem; margin-bottom:2rem; flex-wrap:wrap; }
  .tab {
    background:var(--surface); border:1px solid var(--border); color:var(--muted);
    padding:9px 22px; border-radius:22px; font-family:'DM Sans',sans-serif;
    font-size:0.88rem; font-weight:500; cursor:pointer; transition:all 0.2s;
  }
  .tab:hover { color:var(--text); border-color:var(--accent); }
  .tab.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }

  /* SECTIONS */
  .main { padding:0 2rem 5rem; }
  .section { margin-bottom:3rem; opacity:0; transform:translateY(20px); animation:fadeUp 0.5s ease forwards; }
  .section:nth-child(1){animation-delay:0.05s} .section:nth-child(2){animation-delay:0.15s}
  .section:nth-child(3){animation-delay:0.25s} .section:nth-child(4){animation-delay:0.35s}
  .section:nth-child(5){animation-delay:0.45s}
  @keyframes fadeUp { to{opacity:1;transform:translateY(0)} }
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.2rem; }
  .section-title { font-family:'Bebas Neue',cursive; font-size:1.65rem; letter-spacing:1.5px; display:flex; align-items:center; gap:10px; }
  .section-title::before { content:''; display:block; width:4px; height:22px; background:var(--accent); border-radius:2px; }

  /* CARDS */
  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:14px; }
  .card {
    position:relative; border-radius:10px; overflow:hidden; background:var(--card);
    cursor:pointer; transition:transform 0.25s,box-shadow 0.25s; aspect-ratio:2/3;
    border:1px solid var(--border);
  }
  .card:hover { transform:scale(1.05) translateY(-5px); box-shadow:0 20px 48px rgba(0,0,0,0.7),0 0 0 1px var(--accent); z-index:10; }
  .card img { width:100%; height:100%; object-fit:cover; display:block; transition:filter 0.3s; }
  .card:hover img { filter:brightness(0.55); }
  .card-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to top,rgba(8,12,20,0.97) 0%,transparent 55%);
    display:flex; flex-direction:column; justify-content:flex-end; padding:12px;
    opacity:0; transition:opacity 0.3s;
  }
  .card:hover .card-overlay { opacity:1; }
  .card-title { font-size:0.83rem; font-weight:600; line-height:1.3; margin-bottom:4px; }
  .card-meta { display:flex; align-items:center; gap:6px; font-size:0.72rem; color:var(--muted); }
  .card-rating { background:rgba(240,192,64,0.2); color:var(--gold); border-radius:4px; padding:1px 6px; font-size:0.7rem; font-weight:700; }
  .card-play {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.7);
    width:50px; height:50px; background:rgba(232,160,32,0.92); border-radius:50%;
    display:flex; align-items:center; justify-content:center; opacity:0; transition:all 0.25s;
  }
  .card:hover .card-play { opacity:1; transform:translate(-50%,-50%) scale(1); }
  .card-play svg { fill:#000; width:18px; height:18px; margin-left:3px; }
  .badge-cartaz { position:absolute; top:8px; left:8px; background:rgba(192,57,43,0.92); color:#fff; font-size:0.6rem; font-weight:800; letter-spacing:1px; padding:3px 7px; border-radius:4px; text-transform:uppercase; }
  .skeleton { aspect-ratio:2/3; border-radius:10px; background:linear-gradient(90deg,var(--card) 25%,var(--border) 50%,var(--card) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .no-poster { width:100%; height:100%; background:var(--card); display:flex; align-items:center; justify-content:center; font-size:3rem; color:var(--border); }

  /* SEARCH */
  .search-results { display:none; padding:0 2rem 5rem; }
  .search-results.visible { display:block; }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:200;
    display:flex; align-items:center; justify-content:center; padding:1rem;
    opacity:0; pointer-events:none; transition:opacity 0.3s; backdrop-filter:blur(10px);
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal {
    background:var(--surface); border:1px solid var(--border); border-radius:18px;
    width:100%; max-width:620px; overflow:hidden;
    transform:translateY(24px) scale(0.97); transition:transform 0.3s;
    max-height:92vh; overflow-y:auto;
  }
  .modal-overlay.open .modal { transform:translateY(0) scale(1); }

  /* Modal backdrop */
  .modal-backdrop { position:relative; height:260px; overflow:hidden; }
  .modal-backdrop img { width:100%; height:100%; object-fit:cover; display:block; filter:brightness(0.6); }
  .modal-backdrop-grad {
    position:absolute; inset:0;
    background:linear-gradient(to top,var(--surface) 0%,transparent 60%),
               linear-gradient(to right,rgba(8,12,20,0.5),transparent);
  }
  .modal-close-btn {
    position:absolute; top:14px; right:14px;
    background:rgba(0,0,0,0.7); border:none; color:#fff;
    width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:1rem;
    display:flex; align-items:center; justify-content:center; transition:background 0.2s; z-index:5;
  }
  .modal-close-btn:hover { background:rgba(192,57,43,0.9); }

  .modal-body { padding:18px 22px 24px; }
  .modal-title { font-family:'Bebas Neue',cursive; font-size:2.2rem; letter-spacing:1px; margin-bottom:8px; line-height:1; }
  .modal-meta { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; font-size:0.83rem; color:var(--muted); align-items:center; }
  .modal-rating { color:var(--gold); font-weight:700; font-size:0.95rem; }
  .modal-desc { font-size:0.87rem; line-height:1.7; color:#b8c2d4; margin-bottom:20px; }

  /* Watch options */
  .watch-label { font-size:0.75rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  .watch-options { display:flex; flex-direction:column; gap:10px; }

  .watch-btn {
    display:flex; align-items:center; gap:14px; padding:14px 16px;
    border-radius:12px; border:1px solid var(--border); cursor:pointer;
    transition:all 0.2s; text-decoration:none; color:var(--text); background:var(--card);
  }
  .watch-btn:hover { border-color:var(--accent); transform:translateX(4px); background:rgba(232,160,32,0.06); }
  .watch-btn.primary { background:linear-gradient(135deg,rgba(123,47,247,0.2),rgba(85,33,181,0.2)); border-color:rgba(123,47,247,0.5); }
  .watch-btn.primary:hover { border-color:var(--purple); background:linear-gradient(135deg,rgba(123,47,247,0.3),rgba(85,33,181,0.3)); }

  .watch-icon { width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
  .watch-icon.purple { background:linear-gradient(135deg,#7b2ff7,#5521b5); }
  .watch-icon.dark { background:var(--border); }
  .watch-info { flex:1; }
  .watch-info strong { display:block; font-size:0.92rem; font-weight:700; margin-bottom:2px; }
  .watch-info span { font-size:0.78rem; color:var(--muted); line-height:1.3; }
  .watch-arrow { color:var(--muted); font-size:1rem; }

  /* Genres pills */
  .genres { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
  .genre-pill { background:var(--card); border:1px solid var(--border); padding:3px 10px; border-radius:20px; font-size:0.73rem; color:var(--muted); }

  /* Loading spinner inside modal */
  .modal-loading { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:0.85rem; padding:8px 0; }
  .mini-spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; flex-shrink:0; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* Scrollbar */
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <span class="logo-text">CINE<span>TECA</span></span>
  </div>
  <nav>
    <button class="nav-btn active" onclick="showSection('home',this)">Início</button>
    <button class="nav-btn" onclick="showSection('movies',this)">Filmes</button>
    <button class="nav-btn" onclick="showSection('series',this)">Séries</button>
  </nav>
  <div class="search-bar">
    <span style="color:var(--muted)">🔍</span>
    <input type="text" placeholder="Buscar..." id="searchInput" oninput="handleSearch(this.value)">
  </div>
</header>

<div id="mainContent">
  <!-- HERO -->
  <div class="hero" id="heroSection">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-gradient"></div>
    <div class="hero-content">
      <div class="hero-tag">✦ Em Destaque</div>
      <div class="hero-title" id="heroTitle">Carregando...</div>
      <div class="hero-meta" id="heroMeta"></div>
      <div class="hero-desc" id="heroDesc"></div>
      <div class="hero-actions" id="heroActions"></div>
    </div>
  </div>

  <div class="tabs" id="tabsBar" style="display:none"></div>
  <div class="main" id="sections"></div>
</div>

<div class="search-results" id="searchResults">
  <div class="section" style="animation-delay:0s">
    <div class="section-header"><div class="section-title">Resultados</div></div>
    <div class="cards-grid" id="searchGrid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-backdrop" id="modalBackdrop">
      <img id="modalBg" src="" alt="" onerror="this.style.display='none'">
      <div class="modal-backdrop-grad"></div>
      <button class="modal-close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="genres" id="modalGenres"></div>
      <div class="modal-desc" id="modalDesc"></div>

      <div class="watch-label">Onde assistir</div>
      <div class="modal-loading" id="modalLoading">
        <div class="mini-spinner"></div>
        <span>Buscando disponibilidade...</span>
      </div>
      <div class="watch-options" id="watchOptions" style="display:none"></div>
    </div>
  </div>
</div>

<script>
const TMDB_KEY = '8265bd1679663a7ea12ac168da84d2e8';
const BASE = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/w500';
const IMG_BG = 'https://image.tmdb.org/t/p/w1280';
const LANG = 'pt-BR';

let heroItems = [], heroIndex = 0, heroTimer;

async function tmdb(path, params={}) {
  const q = new URLSearchParams({api_key:TMDB_KEY, language:LANG, ...params});
  const r = await fetch(`${BASE}${path}?${q}`);
  return r.json();
}

async function getImdbId(tmdbId, type) {
  try {
    const d = await tmdb(`/${type}/${tmdbId}/external_ids`);
    return d.imdb_id || null;
  } catch(e) { return null; }
}

// Build correct Stremio Web URL using IMDB id
function stremioWebUrl(imdbId, type) {
  // Format: https://web.strem.io/#/detail/movie/tt1234567  or  /detail/series/tt1234567
  const t = type === 'movie' ? 'movie' : 'series';
  return `https://web.strem.io/#/detail/${t}/${imdbId}`;
}

// ======= MODAL =======
async function openModal(item, type) {
  const title = item.title || item.name;
  const year = (item.release_date || item.first_air_date || '').slice(0,4);
  const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
  const votes = item.vote_count ? `${(item.vote_count/1000).toFixed(1)}k votos` : '';
  const typeLabel = type === 'movie' ? '🎬 Filme' : '📺 Série';

  // Backdrop
  const bg = item.backdrop_path ? IMG_BG + item.backdrop_path : (item.poster_path ? IMG + item.poster_path : '');
  document.getElementById('modalBg').src = bg;
  document.getElementById('modalBg').style.display = bg ? 'block' : 'none';

  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMeta').innerHTML = `
    <span>${typeLabel}</span>
    ${year ? `<span>· ${year}</span>` : ''}
    ${rating ? `<span class="modal-rating">⭐ ${rating}</span>` : ''}
    ${votes ? `<span>· ${votes}</span>` : ''}
  `;
  document.getElementById('modalDesc').textContent = item.overview || 'Sem descrição disponível.';
  document.getElementById('modalGenres').innerHTML = '';

  // Reset watch options
  document.getElementById('modalLoading').style.display = 'flex';
  document.getElementById('watchOptions').style.display = 'none';
  document.getElementById('watchOptions').innerHTML = '';

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Fetch details (genres + imdb id)
  const tmdbType = type === 'tv' ? 'tv' : 'movie';
  try {
    const [details, extIds] = await Promise.all([
      tmdb(`/${tmdbType}/${item.id}`),
      tmdb(`/${tmdbType}/${item.id}/external_ids`)
    ]);

    // Genres
    const genres = (details.genres || []).slice(0,4);
    document.getElementById('modalGenres').innerHTML = genres.map(g =>
      `<span class="genre-pill">${g.name}</span>`
    ).join('');

    const imdbId = extIds.imdb_id || null;
    buildWatchOptions(imdbId, type, title);
  } catch(e) {
    buildWatchOptions(null, type, title);
  }
}

function buildWatchOptions(imdbId, type, title) {
  document.getElementById('modalLoading').style.display = 'none';
  const opts = document.getElementById('watchOptions');
  opts.style.display = 'flex';
  opts.innerHTML = '';

  if (imdbId) {
    const stremioUrl = stremioWebUrl(imdbId, type);
    const stremioAppUrl = `stremio://detail/${type === 'movie' ? 'movie' : 'series'}/${imdbId}`;

    // Primary: Stremio Web
    opts.innerHTML += `
      <a href="${stremioUrl}" target="_blank" class="watch-btn primary">
        <div class="watch-icon purple">▶</div>
        <div class="watch-info">
          <strong>Assistir no Stremio Web</strong>
          <span>Abre direto no navegador — gratuito</span>
        </div>
        <span class="watch-arrow">→</span>
      </a>
      <a href="${stremioAppUrl}" class="watch-btn">
        <div class="watch-icon dark">📱</div>
        <div class="watch-info">
          <strong>Abrir no App Stremio</strong>
          <span>Se o app estiver instalado</span>
        </div>
        <span class="watch-arrow">→</span>
      </a>
    `;
  } else {
    // Fallback: search by title
    const q = encodeURIComponent(title);
    opts.innerHTML += `
      <a href="https://web.strem.io/#/search?search=${q}" target="_blank" class="watch-btn primary">
        <div class="watch-icon purple">🔍</div>
        <div class="watch-info">
          <strong>Buscar no Stremio Web</strong>
          <span>Pesquisar "${title}" no Stremio</span>
        </div>
        <span class="watch-arrow">→</span>
      </a>
    `;
  }

  // Always add TMDB link as extra info
  opts.innerHTML += `
    <a href="https://www.themoviedb.org/${type === 'movie' ? 'movie' : 'tv'}/${type === 'movie' ? '' : ''}" target="_blank" class="watch-btn" style="display:none"></a>
  `;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ======= CARDS =======
function makeCard(item, type) {
  const div = document.createElement('div');
  div.className = 'card';
  div.onclick = () => openModal(item, type);
  const year = (item.release_date || item.first_air_date || '').slice(0,4);
  const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
  const isCinema = item.release_date && new Date(item.release_date) > new Date(Date.now() - 60*24*60*60*1000);
  div.innerHTML = `
    ${item.poster_path
      ? `<img src="${IMG}${item.poster_path}" alt="${item.title||item.name}" loading="lazy">`
      : '<div class="no-poster">🎬</div>'}
    ${isCinema && type==='movie' ? '<div class="badge-cartaz">Em Cartaz</div>' : ''}
    <div class="card-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
    <div class="card-overlay">
      <div class="card-title">${item.title||item.name}</div>
      <div class="card-meta">
        ${rating ? `<span class="card-rating">⭐ ${rating}</span>` : ''}
        ${year ? `<span>${year}</span>` : ''}
      </div>
    </div>
  `;
  return div;
}

function skeletons(n=8) {
  return Array.from({length:n}, () => { const d=document.createElement('div'); d.className='skeleton'; return d; });
}

async function buildSection(title, endpoint, type, params={}) {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `<div class="section-header"><div class="section-title">${title}</div></div>`;
  const grid = document.createElement('div');
  grid.className = 'cards-grid';
  skeletons(8).forEach(s => grid.appendChild(s));
  sec.appendChild(grid);
  document.getElementById('sections').appendChild(sec);
  try {
    const data = await tmdb(endpoint, params);
    grid.innerHTML = '';
    (data.results||[]).slice(0,12).forEach(item => grid.appendChild(makeCard(item, type)));
  } catch(e) { grid.innerHTML = '<p style="color:var(--muted);font-size:0.85rem">Erro ao carregar.</p>'; }
}

// ======= HERO =======
async function buildHero() {
  try {
    const [m, t] = await Promise.all([tmdb('/trending/movie/day'), tmdb('/trending/tv/day')]);
    heroItems = [
      ...(m.results||[]).slice(0,3).map(i=>({...i,_type:'movie'})),
      ...(t.results||[]).slice(0,2).map(i=>({...i,_type:'tv'}))
    ].filter(i => i.backdrop_path);
    setHero(0);
    heroTimer = setInterval(() => { heroIndex=(heroIndex+1)%heroItems.length; setHero(heroIndex); }, 7000);
  } catch(e){}
}

function setHero(idx) {
  const item = heroItems[idx]; if(!item) return;
  const type = item._type;
  const year = (item.release_date||item.first_air_date||'').slice(0,4);
  const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
  document.getElementById('heroBg').style.backgroundImage = `url(${IMG_BG}${item.backdrop_path})`;
  document.getElementById('heroTitle').textContent = item.title||item.name;
  document.getElementById('heroMeta').innerHTML = `
    <span>${type==='movie'?'🎬 Filme':'📺 Série'}</span>
    ${year?`<span>· ${year}</span>`:''}
    ${rating?`<span class="hero-rating">⭐ ${rating}</span>`:''}
  `;
  document.getElementById('heroDesc').textContent = item.overview||'';
  document.getElementById('heroActions').innerHTML = `
    <button class="btn-watch" onclick="openModal(heroItems[${idx}],'${type}')">▶ Assistir</button>
    <button class="btn-info" onclick="openModal(heroItems[${idx}],'${type}')">ℹ Detalhes</button>
  `;
}

// ======= NAVIGATION =======
function showSection(sec, btn) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('heroSection').style.display = sec==='home' ? 'block' : 'none';
  document.getElementById('tabsBar').style.display = sec!=='home' ? 'flex' : 'none';
  document.getElementById('sections').innerHTML = '';
  document.getElementById('searchResults').classList.remove('visible');
  document.getElementById('searchInput').value = '';
  document.getElementById('mainContent').style.display = 'block';

  if (sec==='home') buildHome();
  else if (sec==='movies') { setupMovieTabs(); loadMovieTab('popular'); }
  else if (sec==='series') { setupSeriesTabs(); loadSeriesTab('popular'); }
}

function setupMovieTabs() {
  document.getElementById('tabsBar').innerHTML = [
    ['popular','🔥 Populares'], ['top_rated','⭐ Mais Votados'],
    ['now_playing','🎬 Em Cartaz'], ['upcoming','🗓️ Em Breve']
  ].map((t,i)=>`<button class="tab${i===0?' active':''}" onclick="activateTab(this);document.getElementById('sections').innerHTML='';loadMovieTab('${t[0]}')">${t[1]}</button>`).join('');
}

function setupSeriesTabs() {
  document.getElementById('tabsBar').innerHTML = [
    ['popular','🔥 Populares'], ['top_rated','⭐ Mais Votadas'],
    ['on_the_air','📡 No Ar'], ['airing_today','📅 Hoje']
  ].map((t,i)=>`<button class="tab${i===0?' active':''}" onclick="activateTab(this);document.getElementById('sections').innerHTML='';loadSeriesTab('${t[0]}')">${t[1]}</button>`).join('');
}

function activateTab(el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

async function loadMovieTab(tab) {
  const m={popular:['🔥 Filmes Populares','/movie/popular'],top_rated:['⭐ Mais Votados','/movie/top_rated'],now_playing:['🎬 Em Cartaz','/movie/now_playing'],upcoming:['🗓️ Em Breve','/movie/upcoming']};
  await buildSection(m[tab][0], m[tab][1], 'movie');
}

async function loadSeriesTab(tab) {
  const m={popular:['🔥 Séries Populares','/tv/popular'],top_rated:['⭐ Mais Votadas','/tv/top_rated'],on_the_air:['📡 Séries no Ar','/tv/on_the_air'],airing_today:['📅 Hoje','/tv/airing_today']};
  await buildSection(m[tab][0], m[tab][1], 'tv');
}

async function buildHome() {
  document.getElementById('sections').innerHTML = '';
  await Promise.all([
    buildSection('🔥 Filmes em Alta', '/trending/movie/week', 'movie'),
    buildSection('📺 Séries em Alta', '/trending/tv/week', 'tv'),
    buildSection('⭐ Filmes Mais Votados', '/movie/top_rated', 'movie'),
    buildSection('🎬 Em Cartaz', '/movie/now_playing', 'movie'),
    buildSection('🏆 Séries Mais Votadas', '/tv/top_rated', 'tv'),
  ]);
}

// ======= SEARCH =======
let searchTimeout;
function handleSearch(val) {
  clearTimeout(searchTimeout);
  const sr = document.getElementById('searchResults');
  const mc = document.getElementById('mainContent');
  if (!val.trim()) { sr.classList.remove('visible'); mc.style.display='block'; return; }
  mc.style.display = 'none';
  sr.classList.add('visible');
  searchTimeout = setTimeout(async () => {
    const grid = document.getElementById('searchGrid');
    grid.innerHTML = '';
    skeletons(8).forEach(s=>grid.appendChild(s));
    try {
      const [mv, tv] = await Promise.all([tmdb('/search/movie',{query:val}), tmdb('/search/tv',{query:val})]);
      grid.innerHTML = '';
      const all = [
        ...(mv.results||[]).map(i=>({...i,_type:'movie'})),
        ...(tv.results||[]).map(i=>({...i,_type:'tv'}))
      ].sort((a,b)=>(b.popularity||0)-(a.popularity||0)).slice(0,24);
      if (!all.length) {
        grid.innerHTML = '<p style="color:var(--muted);grid-column:1/-1;font-size:0.9rem">Nenhum resultado encontrado.</p>';
      } else {
        all.forEach(item => grid.appendChild(makeCard(item, item._type)));
      }
    } catch(e){}
  }, 400);
}

// INIT
buildHero();
buildHome();
</script>
</body>
